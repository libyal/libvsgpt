[project]
name: "libvsgpt"
status: "experimental"
year_of_creation: "2019"
data_format: "GUID Partition Table (GPT) volume system"
documentation_url: "https://github.com/libyal/libvsgpt/tree/main/documentation"
features: ["debug_output", "ossfuzz", "python_bindings", "tools"]

[library]
features: ["pthread", "wide_character_type"]
public_types: ["partition", "volume"]
tests: ["boot_record", "checksum", "chs_address", "error", "io_handle", "mbr_partition_entry", "mbr_partition_type", "notify", "partition", "partition_entry", "partition_table_header", "partition_type_identifier", "partition_values", "section_values", "sector_data"]
tests_with_input: ["support", "volume"]

[python_module]
tests: ["support"]
tests_with_input: ["partition", "volume"]

[tools]
description: "Several tools for Several tools for reading GUID Partition Table (GPT) volume systems"
names: ["vsgptinfo"]
tests: ["info_handle", "output", "signal"]

[test_data]
repository: "log2timeline/dfvfs"
files: ["gpt.raw"]

[tests]
profiles: ["libvsgpt", "pyvsgpt", "vsgptinfo"]
info_tool_options_per_profile: [""]
info_tool_profiles: ["vsgptinfo"]
example_filename1: "image1.raw"
example_filename2: "image2.raw"

[troubleshooting]
example: "vsgptinfo image.raw"

